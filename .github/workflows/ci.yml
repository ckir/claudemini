name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build and Validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Build (Release)
      run: cargo build --release --verbose

    - name: Run unit tests
      run: cargo test --release --verbose

    - name: Run Dry Run Validation (Emulation)
      run: cargo run --release --bin claudemini -- --dry-run --debug

    - name: Package Artifacts (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p staging
        cp target/release/claudemini staging/
        cp target/release/claude_mcp staging/
        cp target/release/gemini_mcp staging/

    - name: Package Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        New-Item -ItemType Directory -Force -Path staging
        Copy-Item target/release/claudemini.exe staging/
        Copy-Item target/release/claude_mcp.exe staging/
        Copy-Item target/release/gemini_mcp.exe staging/

    - name: Upload Release Binaries (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v7
      with:
        name: claudemini-linux-amd64
        path: staging/
        retention-days: 7

    - name: Upload Release Binaries (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v7
      with:
        name: claudemini-windows-amd64
        path: staging/
        retention-days: 7

  release:
    name: Create GitHub Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6

    - uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Prepare Release Assets
      run: |
        mkdir release-assets
        # Linux
        cd artifacts/claudemini-linux-amd64
        chmod +x *
        tar -czvf ../../release-assets/claudemini-linux-amd64.tar.gz *
        cd ../../
        # Windows
        cd artifacts/claudemini-windows-amd64
        zip -r ../../release-assets/claudemini-windows-amd64.zip *
        cd ../../

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-assets/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
